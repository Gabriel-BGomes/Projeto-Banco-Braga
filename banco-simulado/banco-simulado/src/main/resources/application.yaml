spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/bbragaproj
    username: sysadm
    password: 123456
  jpa:
    hibernate:
      ddl-auto: validate        # em dev pode usar update, mas prefira migrações (Flyway)
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  mvc:
    problem-details:
      enabled: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized